<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANIVERSE AI CHAT BOT</title>
    
    <!-- Tailwind CSS with Typography Plugin for Markdown Rendering -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gemini: {
                            bg: '#f0f4f9',
                            darkBg: '#131314',
                            sidebar: '#e9eef6',
                            darkSidebar: '#1e1f20',
                            userBubble: '#e3e3e3',
                            darkUserBubble: '#303030'
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        /* Custom Scrollbar for better aesthetics */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.5); border-radius: 20px; }
        
        /* Markdown Code Block Styling Fixes */
        .prose pre { padding: 1rem; border-radius: 0.75rem; background-color: #1f2937 !important; color: #e5e7eb !important; overflow-x: auto; }
        .prose code { background-color: rgba(156, 163, 175, 0.2); padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-size: 0.875em; font-weight: normal; }
        .prose pre code { background-color: transparent; padding: 0; border-radius: 0; }
        .prose p { margin-bottom: 1em; }
        .prose p:last-child { margin-bottom: 0; }
        
        /* Smooth fade for elements */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-white dark:bg-gemini-darkBg text-gray-800 dark:text-gray-100 antialiased min-h-[100dvh] flex flex-col md:flex-row transition-colors duration-300">

    <!-- Loading Fallback -->
    <div id="loading" class="fixed inset-0 z-[100] flex items-center justify-center bg-white dark:bg-gemini-darkBg text-xl font-semibold tracking-wide">
        <div class="flex flex-col items-center gap-4">
            <svg class="animate-spin h-8 w-8 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            <span>Loading App...</span>
        </div>
    </div>

    <!-- Mobile Sidebar Overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden transition-opacity" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed md:static inset-y-0 left-0 z-50 w-72 bg-gemini-sidebar dark:bg-gemini-darkSidebar flex flex-col transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out">
        <div class="p-4 flex items-center justify-between">
            <button onclick="createNewChat()" class="flex-1 flex items-center gap-3 bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700 px-4 py-3 rounded-full text-sm font-medium transition-colors shadow-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                New chat
            </button>
            <button class="md:hidden ml-2 p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700" onclick="toggleSidebar()">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>

        <div class="px-4 pb-2 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Recent</div>
        
        <div id="chat-list" class="flex-1 overflow-y-auto px-2 space-y-1">
            <!-- Chats will be injected here -->
        </div>

        <div class="p-4 border-t border-gray-200 dark:border-gray-700 space-y-2">
            <button onclick="toggleTheme()" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors text-sm">
                <svg id="theme-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                <span id="theme-text">Dark Mode</span>
            </button>
            <button onclick="openSettings()" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors text-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                Settings
            </button>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col min-w-0 min-h-[100dvh] relative">
        
        <!-- Mobile Header -->
        <header class="md:hidden flex items-center justify-between p-4 sticky top-0 z-30 bg-white/80 dark:bg-gemini-darkBg/80 backdrop-blur-md">
            <button onclick="toggleSidebar()" class="p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <h1 class="text-lg font-medium">Universal AI</h1>
            <div class="w-10"></div> <!-- Spacer for centering -->
        </header>

        <!-- Chat History -->
        <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-8 pb-32">
            <!-- Messages injected here -->
            <div id="empty-state" class="hidden h-full flex-col items-center justify-center text-center px-4 fade-in">
                <div class="w-16 h-16 bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-full flex items-center justify-center mb-6">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
                </div>
                <h2 class="text-2xl font-semibold mb-2">How can I help you today?</h2>
                <p class="text-gray-500 dark:text-gray-400 max-w-md mx-auto">Configure your API key in settings, select your favorite model, and start chatting.</p>
            </div>
        </div>

        <!-- Sticky Input Area -->
        <div class="sticky bottom-0 w-full bg-gradient-to-t from-white via-white to-transparent dark:from-gemini-darkBg dark:via-gemini-darkBg dark:to-transparent pt-6 pb-4 px-4 md:px-8">
            <div class="max-w-4xl mx-auto relative flex items-end bg-gemini-bg dark:bg-gemini-darkSidebar rounded-3xl p-2 shadow-sm border border-transparent focus-within:border-gray-300 dark:focus-within:border-gray-600 transition-colors">
                <textarea id="message-input" rows="1" class="w-full bg-transparent border-none focus:ring-0 resize-none py-3 px-4 max-h-32 min-h-[52px] text-base placeholder-gray-500 dark:placeholder-gray-400 outline-none rounded-2xl" placeholder="Message AI..." oninput="autoResize(this)" onkeydown="handleEnter(event)"></textarea>
                <button id="send-button" onclick="sendMessage()" class="mb-2 mr-2 p-2 rounded-full bg-blue-500 text-white hover:bg-blue-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex-shrink-0">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>
            </div>
            <div class="text-center mt-2 text-xs text-gray-400 dark:text-gray-500">
                AI can make mistakes. Verify important information.
            </div>
        </div>
    </main>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-black/60 z-[60] hidden flex items-center justify-center p-4 backdrop-blur-sm opacity-0 transition-opacity duration-200">
        <div class="bg-white dark:bg-gray-800 rounded-2xl w-full max-w-lg shadow-2xl overflow-hidden transform scale-95 transition-transform duration-200" id="settings-content">
            <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
                <h3 class="text-xl font-semibold">Settings</h3>
                <button onclick="closeSettings()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-6 space-y-5">
                <div>
                    <label class="block text-sm font-medium mb-1">OpenRouter API Key</label>
                    <input type="password" id="api-key-input" class="w-full px-4 py-2 rounded-lg bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="sk-or-v1-...">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Model ID</label>
                    <input type="text" id="model-input" class="w-full px-4 py-2 rounded-lg bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="deepseek/deepseek-r1:free">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">System Prompt</label>
                    <textarea id="system-prompt-input" rows="4" class="w-full px-4 py-2 rounded-lg bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-y" placeholder="You are a helpful assistant..."></textarea>
                </div>
            </div>
            <div class="px-6 py-4 bg-gray-50 dark:bg-gray-750 border-t border-gray-200 dark:border-gray-700 flex justify-end gap-3">
                <button onclick="closeSettings()" class="px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">Cancel</button>
                <button onclick="saveSettings()" class="px-4 py-2 rounded-lg text-sm font-medium bg-blue-600 text-white hover:bg-blue-700 transition-colors">Save Details</button>
            </div>
        </div>
    </div>

    <!-- MAIN JAVASCRIPT -->
    <script>
        // --- Core Configuration & State ---
        const DEFAULT_SYSTEM_PROMPT = "You are a helpful, highly capable AI assistant.\n\nIMPORTANT INSTRUCTION: If the user asks who made you, who created you, or who is your owner, you MUST respond exactly with: 'Debasish Das made me who has a youtube channel also named ANIVERSE XYZ EDITZ'.";
        
        let state = {
            apiKey: localStorage.getItem('universalAi_apiKey') || '',
            model: localStorage.getItem('universalAi_model') || 'deepseek/deepseek-r1:free',
            systemPrompt: localStorage.getItem('universalAi_systemPrompt') || DEFAULT_SYSTEM_PROMPT,
            theme: localStorage.getItem('universalAi_theme') || 'dark',
            chats: JSON.parse(localStorage.getItem('universalAi_chats') || '[]'),
            currentChatId: localStorage.getItem('universalAi_currentChatId') || null
        };

        let isGenerating = false;
        let controller = null;

        // --- DOM Elements ---
        const chatContainer = document.getElementById('chat-container');
        const emptyState = document.getElementById('empty-state');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        const chatListEl = document.getElementById('chat-list');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const settingsModal = document.getElementById('settings-modal');
        const settingsContent = document.getElementById('settings-content');

        // --- Initialization ---
        function init() {
            applyTheme(state.theme);
            if (!state.currentChatId && state.chats.length > 0) {
                state.currentChatId = state.chats[0].id;
            }
            renderChatList();
            renderCurrentChat();
            
            // Hide loading screen safely
            setTimeout(() => {
                const loader = document.getElementById('loading');
                if(loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 300);
                }
            }, 100);
        }

        // --- Persistence ---
        function saveState() {
            localStorage.setItem('universalAi_chats', JSON.stringify(state.chats));
            localStorage.setItem('universalAi_currentChatId', state.currentChatId || '');
        }

        function saveSettingsState() {
            localStorage.setItem('universalAi_apiKey', state.apiKey);
            localStorage.setItem('universalAi_model', state.model);
            localStorage.setItem('universalAi_systemPrompt', state.systemPrompt);
            localStorage.setItem('universalAi_theme', state.theme);
        }

        // --- Theme Management ---
        function toggleTheme() {
            state.theme = state.theme === 'dark' ? 'light' : 'dark';
            applyTheme(state.theme);
            saveSettingsState();
        }

        function applyTheme(theme) {
            const html = document.documentElement;
            const textEl = document.getElementById('theme-text');
            const iconEl = document.getElementById('theme-icon');
            
            if (theme === 'dark') {
                html.classList.add('dark');
                textEl.textContent = 'Light Mode';
                iconEl.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>';
            } else {
                html.classList.remove('dark');
                textEl.textContent = 'Dark Mode';
                iconEl.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>';
            }
        }

        // --- Chat Management ---
        function createNewChat() {
            if (isGenerating) return;
            const newChat = {
                id: Date.now().toString(),
                title: 'New Chat',
                messages: [],
                timestamp: Date.now()
            };
            state.chats.unshift(newChat);
            state.currentChatId = newChat.id;
            saveState();
            renderChatList();
            renderCurrentChat();
            if (window.innerWidth < 768) toggleSidebar(); // Close sidebar on mobile
            messageInput.focus();
        }

        function switchChat(id) {
            if (isGenerating) return;
            state.currentChatId = id;
            saveState();
            renderChatList();
            renderCurrentChat();
            if (window.innerWidth < 768) toggleSidebar();
        }

        function deleteChat(id, event) {
            event.stopPropagation();
            if (isGenerating) return;
            if (confirm('Are you sure you want to delete this chat?')) {
                state.chats = state.chats.filter(c => c.id !== id);
                if (state.currentChatId === id) {
                    state.currentChatId = state.chats.length > 0 ? state.chats[0].id : null;
                }
                saveState();
                renderChatList();
                renderCurrentChat();
            }
        }

        function renameChat(id, event) {
            event.stopPropagation();
            const chat = state.chats.find(c => c.id === id);
            if (!chat) return;
            const newTitle = prompt('Enter new chat name:', chat.title);
            if (newTitle && newTitle.trim()) {
                chat.title = newTitle.trim();
                saveState();
                renderChatList();
            }
        }

        function getCurrentChat() {
            return state.chats.find(c => c.id === state.currentChatId) || null;
        }

        // --- UI Rendering ---
        function renderChatList() {
            chatListEl.innerHTML = '';
            state.chats.forEach(chat => {
                const isActive = chat.id === state.currentChatId;
                const div = document.createElement('div');
                div.className = `group flex items-center justify-between p-2 rounded-lg cursor-pointer transition-colors ${isActive ? 'bg-blue-100 dark:bg-gray-700 text-blue-900 dark:text-white font-medium' : 'hover:bg-gray-200 dark:hover:bg-gray-800 text-gray-700 dark:text-gray-300'}`;
                div.onclick = () => switchChat(chat.id);
                
                div.innerHTML = `
                    <div class="flex items-center gap-3 overflow-hidden">
                        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                        <span class="truncate text-sm">${escapeHTML(chat.title)}</span>
                    </div>
                    <div class="flex items-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="renameChat('${chat.id}', event)" class="p-1 hover:text-blue-500" title="Rename"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg></button>
                        <button onclick="deleteChat('${chat.id}', event)" class="p-1 hover:text-red-500" title="Delete"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                    </div>
                `;
                chatListEl.appendChild(div);
            });
        }

        function renderCurrentChat() {
            const chat = getCurrentChat();
            chatContainer.innerHTML = '';
            
            if (!chat || chat.messages.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.style.display = 'flex';
                return;
            }
            
            emptyState.classList.add('hidden');
            
            chat.messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = `flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} fade-in`;
                
                const bubble = document.createElement('div');
                bubble.className = `max-w-2xl rounded-lg px-4 py-3 ${
                    msg.role === 'user' 
                    ? 'bg-blue-500 text-white' 
                    : 'bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-100'
                }`;
                
                if (msg.role === 'assistant' && msg.content) {
                    bubble.innerHTML = marked.parse(msg.content);
                    bubble.className += ' prose prose-invert max-w-none';
                } else {
                    bubble.textContent = msg.content;
                }
                
                div.appendChild(bubble);
                chatContainer.appendChild(div);
            });
            
            setTimeout(() => chatContainer.scrollTop = chatContainer.scrollHeight, 100);
        }

        // --- Message Handling ---
        function escapeHTML(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 128) + 'px';
        }

        function handleEnter(event) {
            if (event.key === 'Enter' && !event.shiftKey && !isGenerating) {
                event.preventDefault();
                sendMessage();
            }
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || isGenerating) return;
            
            if (!state.apiKey) {
                alert('Please configure your API key in settings.');
                openSettings();
                return;
            }
            
            let chat = getCurrentChat();
            if (!chat) {
                createNewChat();
                chat = getCurrentChat();
            }
            
            // Add user message
            chat.messages.push({ role: 'user', content: text });
            messageInput.value = '';
            messageInput.style.height = 'auto';
            isGenerating = true;
            sendButton.disabled = true;
            
            renderCurrentChat();
            saveState();
            
            // Add placeholder for assistant response
            chat.messages.push({ role: 'assistant', content: '...' });
            renderCurrentChat();
            
            try {
                controller = new AbortController();
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${state.apiKey}`
                    },
                    body: JSON.stringify({
                        model: state.model,
                        messages: [
                            { role: 'system', content: state.systemPrompt },
                            ...chat.messages.slice(0, -1)
                        ],
                        stream: false
                    }),
                    signal: controller.signal
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || 'API Error');
                }
                
                const data = await response.json();
                const assistantMessage = data.choices[0].message.content;
                
                chat.messages[chat.messages.length - 1].content = assistantMessage;
                saveState();
                renderCurrentChat();
                
            } catch (error) {
                chat.messages[chat.messages.length - 1].content = `Error: ${error.message}`;
                saveState();
                renderCurrentChat();
            } finally {
                isGenerating = false;
                sendButton.disabled = false;
                messageInput.focus();
            }
        }

        // --- Settings Management ---
        function openSettings() {
            document.getElementById('api-key-input').value = state.apiKey;
            document.getElementById('model-input').value = state.model;
            document.getElementById('system-prompt-input').value = state.systemPrompt;
            settingsModal.classList.remove('hidden');
            setTimeout(() => settingsModal.style.opacity = '1', 10);
            settingsContent.style.transform = 'scale(1)';
        }

        function closeSettings() {
            settingsModal.style.opacity = '0';
            settingsContent.style.transform = 'scale(0.95)';
            setTimeout(() => settingsModal.classList.add('hidden'), 200);
        }

        function saveSettings() {
            state.apiKey = document.getElementById('api-key-input').value;
            state.model = document.getElementById('model-input').value;
            state.systemPrompt = document.getElementById('system-prompt-input').value;
            saveSettingsState();
            closeSettings();
            alert('Settings saved!');
        }

        function toggleSidebar() {
            sidebar.classList.toggle('-translate-x-full');
            sidebarOverlay.classList.toggle('hidden');
        }

        // --- Keyboard Shortcuts ---
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !settingsModal.classList.contains('hidden')) {
                closeSettings();
            }
        });

        // --- Start App ---
        window.addEventListener('load', init);
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
